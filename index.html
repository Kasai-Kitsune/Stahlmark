<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STAHLMARK</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      background: #000;
      color: #ddd;
      font-family: 'Courier Prime', 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
    }
    .container {
      max-width: 420px;
      padding: 2rem;
    }
    h1 {
      font-size: 3.2rem;
      letter-spacing: 0.15em;
      color: #cc1111;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px #cc1111;
    }
    .subtitle {
      font-size: 1.1rem;
      letter-spacing: 0.25em;
      color: #666;
      margin-bottom: 3rem;
    }
    .play-btn {
      display: inline-block;
      padding: 18px 48px;
      font-size: 1.35rem;
      letter-spacing: 0.2em;
      color: #fff;
      background: rgba(204, 17, 17, 0.9);
      border: 2px solid #cc1111;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 0 30px rgba(204, 17, 17, 0.4);
    }
    .play-btn:hover {
      background: #cc1111;
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(204, 17, 17, 0.7);
    }
    .info {
      margin-top: 3rem;
      font-size: 0.9rem;
      color: #555;
      line-height: 1.5;
    }
    .weapon-tease {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 2rem 0;
      opacity: 0.6;
    }
    .weapon-tease img {
      height: 60px;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>STAHLMARK</h1>
    <p class="subtitle">NO LONGER REQUIRING QUARTERS</p>

    <a href="Stahlmark-Game.html" class="play-btn">ENTER THE GAME</a>

    <div class="weapon-tease">
      <img src="Nade-asset.png" alt="Nade">
      <img src="Gungnir-asset.jpg" alt="Gungnir">
      <img src="Klarhet-asset.jpg" alt="Klarhet">
    </div>

    <div class="info">
      Only Launches in Landscape mode on mobile<br>
      PC: Click to lock mouse • WASD + Mouse
    </div>
  </div>
</body>
</html>
